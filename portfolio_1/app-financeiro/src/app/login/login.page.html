<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-subtitle>Insira seu login</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label>Usuario:</ion-label>
        <ion-input [(ngModel)]="login.usuario" placeholder="Digite seu login"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label>Senha:</ion-label>
        <ion-input [(ngModel)]="login.senha" placeholder="Digite sua senha"></ion-input>
      </ion-item>
      <ion-button expand="block" (click)="avancar()">Avançar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
